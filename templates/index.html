<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BigQuery Release Notes Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>BigQuery Releases</h1>
            <p class="subtitle">Latest updates and feature announcements</p>
        </header>

        <div class="controls">
            <button id="refresh-btn">
                <span class="spinner" id="spinner"></span>
                <span id="btn-text">Refresh Updates</span>
            </button>
        </div>

        <div id="releases-container">
            <!-- Releases will be loaded here -->
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
