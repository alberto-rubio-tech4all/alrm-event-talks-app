<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BigQuery Release Notes Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <div class="theme-switch-wrapper">
                <label class="theme-switch" for="checkbox">
                    <input type="checkbox" id="checkbox" />
                    <div class="slider round"></div>
                </label>
                <em>Light Mode</em>
            </div>
            <h1>BigQuery Releases</h1>
            <p class="subtitle">Latest updates and feature announcements</p>
            
            <div class="search-wrapper">
                <input type="text" id="search-input" placeholder="Search releases (e.g. Security, SQL, Storage)..." />
                <div class="search-icon">🔍</div>
            </div>
        </header>

        <div class="controls">
            <button id="refresh-btn">
                <span class="spinner" id="spinner"></span>
                <span id="btn-text">Refresh Updates</span>
            </button>
            <button id="export-csv-btn" class="secondary-btn">
                Export to CSV
            </button>
        </div>

        <div id="releases-container">
            <!-- Releases will be loaded here -->
        </div>
    </div>

    <button id="back-to-top" title="Go to top">↑</button>
    <div id="toast-container"></div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
